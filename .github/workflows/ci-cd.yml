name: Shopee CRM - CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ============================================================
  # JOB 1: Unit Test - Kiểm thử Python/Spark Pipeline
  # ============================================================
  unit-test:
    name: "🧪 Unit Tests (pytest)"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        pip install pytest pytest-cov pyspark==3.5.0

    - name: Run unit tests
      run: |
        pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  # ============================================================
  # JOB 2: Build & Lint Next.js
  # ============================================================
  build-nextjs:
    name: "🏗️ Build Next.js"
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install Node dependencies
      run: npm ci

    - name: Lint check
      run: npm run lint

    - name: Build production bundle
      run: npm run build

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: nextjs-build
        path: .next/
        retention-days: 7

  # ============================================================
  # JOB 3: Build Docker Image
  # ============================================================
  docker-build:
    name: "🐳 Docker Build"
    needs: build-nextjs
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t shopee-crm-demo:latest .

    - name: Smoke test Docker container
      run: |
        docker run -d -p 3000:3000 --name crm-test shopee-crm-demo:latest
        sleep 5
        curl -f http://localhost:3000 || exit 1
        docker stop crm-test
