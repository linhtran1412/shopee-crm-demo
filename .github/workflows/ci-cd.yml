name: Shopee CRM - CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ============================================================
  # JOB 1: Unit Test - Kiểm thử Python Pipeline Logic
  # ============================================================
  unit-test:
    name: "🧪 Unit Tests (pytest)"
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: pip install pytest pytest-cov

    - name: Run unit tests
      run: pytest tests/ -v --tb=short

  # ============================================================
  # JOB 2: Build & Lint Next.js
  # ============================================================
  build-nextjs:
    name: "🏗️ Build Next.js"
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint check
      run: npm run lint

    - name: Build production bundle
      run: npm run build
      env:
        NEXT_TELEMETRY_DISABLED: 1

  # ============================================================
  # JOB 3: Verify Docker (không cần runner có Docker)
  # ============================================================
  docker-verify:
    name: "🐳 Docker Verify"
    needs: build-nextjs
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Verify Dockerfile syntax
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile
        ignore: DL3018,DL3016,SC2046
        failure-threshold: error
